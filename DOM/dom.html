<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>The Big Four Events Lab</title>
    <style>
      body {
        font-family: sans-serif;
        background: #f4f7f6;
        padding: 40px;
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      .card {
        background: white;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        width: 100%;
        max-width: 500px;
        margin-bottom: 20px;
      }
      .status-dot {
        height: 10px;
        width: 100px;
        background: #ccc;
        display: inline-block;
        border-radius: 5px;
      }
      .ready {
        background: #2ecc71;
      }

      /* Modal Styles */
      #modal {
        display: none;
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: white;
        padding: 30px;
        border: 2px solid #333;
        z-index: 100;
        box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
      }
      #overlay {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.5);
        z-index: 50;
      }

      input,
      button {
        padding: 10px;
        margin-top: 10px;
        width: 100%;
        box-sizing: border-box;
      }
      button {
        cursor: pointer;
        background: #3498db;
        color: white;
        border: none;
        font-weight: bold;
      }
      #char-count {
        font-size: 0.8em;
        color: #666;
        float: right;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h3>1. DOM Status</h3>
      <div id="status-text">Loading...</div>
      <div id="status-dot" class="status-dot"></div>
    </div>

    <div class="card">
      <h3>2. Real-time Search (Input)</h3>
      <input type="text" id="search-box" placeholder="Type something..." />
      <span id="char-count">Characters: 0</span>
    </div>

    <div class="card">
      <h3>3. Modal Toggle (Click)</h3>
      <button id="open-btn">Open Secret Message</button>
    </div>

    <div class="card">
      <h3>4. Secure Form (Submit)</h3>
      <form id="login-form">
        <input
          type="password"
          id="pass"
          placeholder="Enter password '1234'"
          required
        />
        <button type="submit">Submit Data</button>
      </form>
    </div>

    <div id="overlay"></div>
    <div id="modal">
      <h2>Surprise! 🚀</h2>
      <p>You used a click event to find me.</p>
      <button id="close-btn" style="background: #e74c3c">Close</button>
    </div>

    <script>
      // --- 1. DOMContentLoaded ---
      // This fires as soon as the HTML is parsed
      document.addEventListener("DOMContentLoaded", () => {
        const status = document.getElementById("status-text");
        const dot = document.getElementById("status-dot");
        status.innerText = "HTML Fully Loaded & Ready!";
        dot.classList.add("ready");
        console.log("Event: DOMContentLoaded fired!");
      });

      // --- 2. Input Event ---
      const searchBox = document.getElementById("search-box");
      const charCount = document.getElementById("char-count");

      searchBox.addEventListener("input", (e) => {
        // e.target.value gets exactly what's in the box right now
        const length = e.target.value.length;
        charCount.innerText = `Characters: ${length}`;

        // Visual feedback: color changes if it gets too long
        charCount.style.color = length > 10 ? "red" : "#666";
      });

      // --- 3. Click Event ---
      const openBtn = document.getElementById("open-btn");
      const closeBtn = document.getElementById("close-btn");
      const modal = document.getElementById("modal");
      const overlay = document.getElementById("overlay");

      const toggleModal = () => {
        const isVisible = modal.style.display === "block";
        modal.style.display = isVisible ? "none" : "block";
        overlay.style.display = isVisible ? "none" : "block";
      };

      openBtn.addEventListener("click", toggleModal);
      closeBtn.addEventListener("click", toggleModal);
      overlay.addEventListener("click", toggleModal);

      // --- 4. Submit Event ---
      const loginForm = document.getElementById("login-form");
      const passInput = document.getElementById("pass");

      loginForm.addEventListener("submit", (e) => {
        // STOP the page from refreshing (the default behavior)
        e.preventDefault();

        if (passInput.value === "1234") {
          alert("Access Granted! The form didn't refresh.");
        } else {
          alert("Wrong password. Try '1234'.");
        }
      });

      
    </script>
  </body>
</html>
